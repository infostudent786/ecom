<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cebu Style Hub | Fast Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .product-card img { aspect-ratio: 3/4; object-fit: cover; }
        /* Smooth scrolling for mobile */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-50 pb-24"> <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <span class="font-extrabold text-lg tracking-tight text-black">CEBU<span class="text-pink-500">STYLE</span></span>
        <div class="flex gap-3">
            <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase">On-Hand</span>
        </div>
    </nav>

    <div class="bg-black text-white text-[11px] py-2 text-center font-medium tracking-wide">
        ⚡ SAME DAY DELIVERY VIA MAXIM / LALAMOVE
    </div>

    <div class="flex overflow-x-auto gap-2 p-4 no-scrollbar">
        <button class="whitespace-nowrap bg-pink-500 text-white px-4 py-2 rounded-full text-xs font-semibold shadow-sm">All Items</button>
        <button class="whitespace-nowrap bg-white border px-4 py-2 rounded-full text-xs font-semibold text-gray-600">New Arrivals</button>
        <button class="whitespace-nowrap bg-white border px-4 py-2 rounded-full text-xs font-semibold text-gray-600">Best Sellers</button>
        <button class="whitespace-nowrap bg-white border px-4 py-2 rounded-full text-xs font-semibold text-gray-600">Under ₱199</button>
    </div>

    <main class="px-4 grid grid-cols-2 gap-3">
        
        <div class="product-card bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?auto=format&fit=crop&w=400" alt="Product">
                <span class="absolute top-2 left-2 bg-white/90 px-2 py-1 rounded text-[9px] font-black uppercase">Trending</span>
            </div>
            <div class="p-3">
                <h3 class="text-xs font-medium text-gray-600 truncate">Linen Blend Coordinates</h3>
                <div class="flex items-center gap-1 mt-1">
                    <span class="text-base font-extrabold text-gray-900">₱299</span>
                    <span class="text-[10px] text-gray-400 line-through">₱450</span>
                </div>
                <button class="w-full mt-3 bg-gray-100 text-gray-800 py-2 rounded-xl text-[11px] font-bold active:scale-95 transition-transform">View Details</button>
            </div>
        </div>

        <div class="product-card bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1572804013307-a9a111d72f8b?auto=format&fit=crop&w=400" alt="Product">
                <span class="absolute top-2 left-2 bg-pink-500 text-white px-2 py-1 rounded text-[9px] font-black uppercase">Sale</span>
            </div>
            <div class="p-3">
                <h3 class="text-xs font-medium text-gray-600 truncate">Floral Puff Sleeve</h3>
                <div class="flex items-center gap-1 mt-1">
                    <span class="text-base font-extrabold text-gray-900">₱185</span>
                </div>
                <button class="w-full mt-3 bg-gray-100 text-gray-800 py-2 rounded-xl text-[11px] font-bold active:scale-95 transition-transform">View Details</button>
            </div>
        </div>

    </main>

    <div class="p-8 text-center mb-10">
        <p class="text-xs text-gray-400">📍 Location: Lahug, Cebu City</p>
        <p class="text-[10px] text-gray-300 mt-1 italic">Not a real store - Demo Site</p>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex gap-3 z-50">
        <a href="https://m.me/YOUR_FB_PAGE" class="flex-1 bg-blue-600 text-white text-center py-3 rounded-2xl font-bold text-sm shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
            <span>Order via Messenger</span>
        </a>
        <a href="sms:+639000000000" class="w-14 bg-pink-100 text-pink-600 rounded-2xl flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
            </svg>
        </a>
    </div>

</body>
</html>
